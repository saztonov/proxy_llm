# /etc/nginx/sites-available/proxy_llm.conf
# ⚠️ ЭТО ФИНАЛЬНЫЙ vhost. Применять ПОСЛЕ выпуска сертификата
#    (см. deploy/INSTALL.md, шаги 6-7).

limit_req_zone  $binary_remote_addr zone=proxy_llm_api:10m  rate=60r/m;
limit_conn_zone $binary_remote_addr zone=proxy_llm_conn:10m;

server {
    listen 443 ssl http2;
    server_name proxy.example.com;       # подставить реальный домен

    ssl_certificate     /etc/letsencrypt/live/proxy.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/proxy.example.com/privkey.pem;

    client_max_body_size 26m;

    # Публичный liveness — для UptimeRobot
    location = /healthz {
        proxy_pass http://127.0.0.1:3000/healthz;
        access_log off;
    }

    # API — только с IP PassDesk
    location /api/ {
        allow 1.2.3.4;                   # IP PassDesk VPS — подставить
        deny all;

        # Таймауты: > REQUEST_DEADLINE_MS=190s, чтобы 504 шёл от прокси, а не от nginx
        proxy_read_timeout   220s;
        proxy_send_timeout   220s;
        proxy_request_buffering off;     # не буферизуем 16 МБ входящий body в nginx
        proxy_buffering off;             # стримим ответ от прокси клиенту

        limit_req  zone=proxy_llm_api  burst=20 nodelay;
        limit_conn proxy_llm_conn 3;     # защита Node от одновременного чтения многих 16МБ body

        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-Id $http_x_request_id;
    }

    # Dashboard — только админ/VPN. Маленькие JSON/HTML, буферизация по умолчанию.
    location /dashboard {
        allow 5.6.7.8;                   # IP админа — подставить
        # allow 9.10.11.12;              # IP VPN — раскомментировать если есть
        deny all;

        proxy_read_timeout   30s;
        proxy_send_timeout   30s;

        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Всё остальное — закрыто
    location / {
        deny all;
        return 404;
    }
}

# HTTP → редирект на HTTPS (опционально, certbot добавит автоматически)
server {
    listen 80;
    server_name proxy.example.com;
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}
